name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: PlanFinder-macOS.zip
          - os: windows-latest
            platform: windows
            artifact: PlanFinder-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra build

      - name: Build with PyInstaller
        run: uv run pyinstaller plan_finder_gui.spec --noconfirm

      - name: Package macOS .app
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent PlanFinder.app ../${{ matrix.artifact }}

      - name: Package Windows folder
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd dist
          7z a ../${{ matrix.artifact }} PlanFinder

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Requirements

            **The Claude CLI must be installed and available on your `PATH`.**
            This app shells out to the `claude` command at runtime — it will not work without it.

            Install: https://github.com/anthropics/claude-code

            ### Optional
            - [`ccusage`](https://github.com/ryoppippi/ccusage) — required only if you use the budget throttle feature.
            - Google Cloud service account JSON — required only if you use Google Translate.

            ## Downloads

            - **macOS**: `PlanFinder-macOS.zip` — unzip and run `PlanFinder.app`.
              On first launch, macOS may block it ("unidentified developer"). Right-click → Open, or run:
              ```bash
              xattr -dr com.apple.quarantine /Applications/PlanFinder.app
              ```
            - **Windows**: `PlanFinder-Windows.zip` — unzip and run `PlanFinder\PlanFinder.exe`.
              SmartScreen may warn on first launch; click "More info" → "Run anyway".
